name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege by default.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · no-guess gate · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc -b)
        run: npx tsc -b

      # ----------------------------------------------------------------------
      # REQUIRED INVARIANT GATE. Every Daily/Endless board (and Classic when the
      # no-guess toggle is on) must be solvable by pure logic. tools/solver-test.ts
      # proves this with 24 assertions and exits non-zero on any regression.
      # This step must never be removed or allowed to go red. See SHIPPING.md.
      # ----------------------------------------------------------------------
      - name: No-guess invariant gate (24/24)
        run: |
          npx esbuild tools/solver-test.ts --bundle --platform=node --format=cjs --outfile=tools/solver-test.cjs
          node tools/solver-test.cjs

      - name: Production web build
        run: npx vite build

      - name: Dependency audit (fail on high+)
        run: npm audit --audit-level=high

  secret-scan:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
